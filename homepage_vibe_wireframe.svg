    <rect x="180" y="0" width="160" height="80" rx="8" fill="#fff" stroke="#ddd"/>
    <text x="198" y="48" font-family="Arial" font-size="14">Indulgent</text>
    <rect x="360" y="0" width="160" height="80" rx="8" fill="#fff" stroke="#ddd"/>
    <text x="378" y="48" font-family="Arial" font-size="14">Healthy</text>
  </g>
  <text x="40" y="300" font-family="Arial" font-size="16">Hero carousel (Vibe highlights):</text>
  <rect x="40" y="320" width="1120" height="220" rx="12" fill="#fff7f0" stroke="#ffd1b3"/>
  <text x="60" y="360" font-family="Arial" font-size="14">Featured: Comforting Picks for Tonight</text>
  <text x="40" y="560" font-family="Arial" font-size="16">Top results (ranked):</text>
  <g transform="translate(60,580)">
    <rect x="0" y="0" width="1080" height="80" rx="8" fill="#fff" stroke="#eee"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 1000" width="400" height="1000">
  <!-- Background -->
  <rect width="400" height="1000" fill="#ffffff"/>
  
  <!-- Header -->
  <rect width="400" height="70" fill="#ff6f00"/>
  <text x="20" y="45" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fff">swiggy</text>
  <circle cx="375" cy="35" r="18" fill="rgba(255,255,255,0.3)"/>
  
  <!-- Mood Section Header -->
  <text x="20" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">How are you feeling?</text>
  
  <!-- Mood Buttons - Mobile Grid -->
  <g>
    <!-- Comforting - Highlighted -->
    <rect x="15" y="125" width="85" height="85" fill="#fff" stroke="#ff6f00" stroke-width="3" rx="12"/>
    <circle cx="57.5" cy="150" r="18" fill="#ffb74d"/>
    <text x="57.5" y="210" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ff6f00" text-anchor="middle">Comforting</text>
    
    <!-- Indulgent -->
    <rect x="115" y="125" width="85" height="85" fill="#fff" stroke="#e0e0e0" stroke-width="2" rx="12"/>
    <circle cx="157.5" cy="150" r="18" fill="#f48fb1"/>
    <text x="157.5" y="210" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">Indulgent</text>
    
    <!-- Healthy -->
    <rect x="215" y="125" width="85" height="85" fill="#fff" stroke="#e0e0e0" stroke-width="2" rx="12"/>
    <circle cx="257.5" cy="150" r="18" fill="#81c784"/>
    <text x="257.5" y="210" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">Healthy</text>
    
    <!-- Quick -->
    <rect x="315" y="125" width="70" height="85" fill="#fff" stroke="#e0e0e0" stroke-width="2" rx="12"/>
    <circle cx="350" cy="150" r="18" fill="#64b5f6"/>
    <text x="350" y="210" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">Quick</text>
  </g>
  
  <!-- Top Picks Section -->
  <text x="20" y="270" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#333">Top Picks For Comforting</text>
  
  <!-- Hero Card 1 -->
  <rect x="15" y="290" width="370" height="150" fill="#ff6f00" rx="14"/>
  <text x="30" y="320" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">Comfort Kitchen</text>
  <text x="30" y="345" font-family="Arial, sans-serif" font-size="13" fill="#fff">Home-style Indian - Warm and Cozy</text>
  <text x="30" y="365" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)">28 mins - 200m away - Free delivery</text>
  
  <!-- Rating Badge -->
  <circle cx="350" cy="330" r="28" fill="#ffb74d"/>
  <text x="350" y="337" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">4.5</text>
  <text x="365" y="330" font-family="Arial, sans-serif" font-size="12" fill="#ff6f00">★</text>
  
  <!-- "Order Now" CTA on hero -->
  <rect x="30" y="405" width="340" height="20" fill="#fff" rx="4"/>
  <text x="200" y="418" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ff6f00" text-anchor="middle">View Combos</text>
  
  <!-- Restaurant Cards -->
  <text x="20" y="485" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">Popular Nearby</text>
  
  <!-- Card 1 -->
  <rect x="15" y="510" width="370" height="100" fill="#fff" stroke="#f0f0f0" stroke-width="1" rx="10"/>
  <rect x="15" y="510" width="95" height="100" fill="#ddd" rx="10"/>
  <text x="120" y="530" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#000">Mama's Kitchen</text>
  <text x="120" y="548" font-family="Arial, sans-serif" font-size="11" fill="#666">North Indian - Authentic</text>
  <text x="120" y="565" font-family="Arial, sans-serif" font-size="10" fill="#999">32 mins - 500m away</text>
  
  <!-- Mood tag -->
  <rect x="120" y="575" width="60" height="22" fill="#fff3e0" rx="4"/>
  <text x="150" y="589" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ff6f00" text-anchor="middle">Comforting</text>
  
  <!-- Rating -->
  <circle cx="350" cy="545" r="22" fill="#ffb74d"/>
  <text x="350" y="552" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">4.7</text>
  
  <!-- Card 2 -->
  <rect x="15" y="625" width="370" height="100" fill="#fff" stroke="#f0f0f0" stroke-width="1" rx="10"/>
  <rect x="15" y="625" width="95" height="100" fill="#ddd" rx="10"/>
  <text x="120" y="645" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#000">Spice and Soul</text>
  <text x="120" y="663" font-family="Arial, sans-serif" font-size="11" fill="#666">Indian Fusion - Comfort Food</text>
  <text x="120" y="680" font-family="Arial, sans-serif" font-size="10" fill="#999">25 mins - 300m away</text>
  
  <!-- Mood tag -->
  <rect x="120" y="690" width="70" height="22" fill="#fff3e0" rx="4"/>
  <text x="155" y="704" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ff6f00" text-anchor="middle">Comforting</text>
  
  <!-- Rating -->
  <circle cx="350" cy="660" r="22" fill="#ffb74d"/>
  <text x="350" y="667" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">4.3</text>
  
  <!-- View All CTA -->
  <rect x="15" y="750" width="370" height="50" fill="#ff6f00" rx="10"/>
  <text x="200" y="785" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#fff" text-anchor="middle">View All 42 Restaurants</text>
  
  <!-- Promo Banner -->
  <rect x="15" y="820" width="370" height="60" fill="#fff3e0" stroke="#ff6f00" stroke-width="2" rx="8"/>
  <text x="30" y="840" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ff6f00">Eating right?</text>
  <text x="30" y="858" font-family="Arial, sans-serif" font-size="11" fill="#666">Explore Healthy mood for balanced options</text>
  
  <!-- Bottom safe area -->
  <rect x="0" y="900" width="400" height="100" fill="#f5f5f5"/>
</svg>
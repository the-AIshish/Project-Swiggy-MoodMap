<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <rect width="100%" height="100%" fill="#fff"/>
  <text x="40" y="60" font-family="Arial" font-size="20" fill="#ff6f00">Swiggy — Homepage Vibe</text>
  <rect x="40" y="90" width="1120" height="120" rx="8" fill="#fff3e0" stroke="#ffd8a6"/>
  <text x="60" y="130" font-family="Arial" font-size="16" fill="#000">Mood cards (horizontal scroll):</text>
  <!-- mood cards -->
  <g transform="translate(60,150)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#fff" stroke="#ddd"/>

    <rect x="0" y="100" width="1080" height="80" rx="8" fill="#fff" stroke="#eee"/>
    <text x="12" y="148" font-family="Arial" font-size="14">2 • Sponsored • 32 mins • ★4.2 • Mood: Comforting</text>
  </g>
  <text x="40" y="720" font-family="Arial" font-size="12" fill="#999">Note: this is a wireframe for review; colors indicate mood accents and not final assets.</text>

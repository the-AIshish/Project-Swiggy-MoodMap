  <text x="125" y="553" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#000">Grand Dining Hall</text>
  <text x="125" y="572" font-family="Arial, sans-serif" font-size="11" fill="#666">Fine Dining • Banquet Space</text>
  <text x="125" y="590" font-family="Arial, sans-serif" font-size="10" fill="#999">50 mins • 3km • Pre-booking available</text>
  
  <!-- Mood & Rating -->
  <rect x="125" y="600" width="70" height="22" fill="#fff3e0" rx="4"/>
  <text x="160" y="614" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ff6f00" text-anchor="middle">Celebration</text>
  
  <circle cx="350" cy="563" r="22" fill="#ffb74d"/>
  <text x="350" y="570" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">4.8</text>
  
  <!-- Result Card 3 -->
  <rect x="15" y="655" width="370" height="110" fill="#fff" stroke="#f0f0f0" stroke-width="1" rx="10"/>
  <rect x="15" y="655" width="100" height="110" fill="#ddd" rx="10"/>
  
  <text x="125" y="678" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#000">Special Occasions</text>
  <text x="125" y="697" font-family="Arial, sans-serif" font-size="11" fill="#666">Theme Cuisine • Customizable</text>
  <text x="125" y="715" font-family="Arial, sans-serif" font-size="10" fill="#999">40 mins • 1.5km • ₹400-800/person</text>
  
  <!-- Mood & Rating -->
  <rect x="125" y="725" width="70" height="22" fill="#fff3e0" rx="4"/>
  <text x="160" y="739" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ff6f00" text-anchor="middle">Celebration</text>
  
  <circle cx="350" cy="688" r="22" fill="#ffb74d"/>
  <text x="350" y="695" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">4.4</text>
  
  <!-- View More CTA -->
  <rect x="15" y="800" width="370" height="50" fill="#ff6f00" rx="10"/>
  <text x="200" y="835" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#fff" text-anchor="middle">See all 42 options</text>
  
  <!-- Bottom safe area -->
  <rect x="0" y="900" width="400" height="200" fill="#f5f5f5"/>

  <rect x="125" y="475" width="70" height="22" fill="#fff3e0" rx="4"/>
  <text x="160" y="489" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ff6f00" text-anchor="middle">Celebration</text>
  
  <circle cx="350" cy="438" r="22" fill="#ffb74d"/>
  <text x="350" y="445" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">4.6</text>
  

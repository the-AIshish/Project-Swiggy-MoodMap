<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 1100" width="400" height="1100">
  <!-- Background -->
  <rect width="400" height="1100" fill="#ffffff"/>
  
  <!-- Header -->
  <rect width="400" height="70" fill="#ff6f00"/>
  <text x="20" y="45" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fff">← Comforting</text>
  <circle cx="375" cy="35" r="18" fill="rgba(255,255,255,0.3)"/>
  
  <!-- Filter Bar -->

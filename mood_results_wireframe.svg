  <text x="25" y="180" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#fff">🎉 Season of Celebration</text>
  <text x="25" y="210" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.95)">Premium picks for special moments</text>
  
  <!-- Featured Cards Carousel (show 1, hint second) -->
  <rect x="15" y="230" width="360" height="110" fill="#fff" stroke="#ff6f00" stroke-width="2" rx="12"/>
  <rect x="15" y="230" width="100" height="110" fill="#ddd" rx="12"/>
  <text x="125" y="255" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#000">The Celebration Kitchen</text>
